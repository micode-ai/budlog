# BudLog — shared-nginx server blocks.
# Install: copy to /opt/shared-nginx/conf.d/budlog.conf on the VPS, then reload.
# The box has NO default_server — every host needs its own block.
#
# Container names (resolved once shared-nginx joins budlog_budlog-network — deploy.sh does this):
#   budlog-api-prod:3000   budlog-web-prod:3001
#
# TLS: issue one cert covering all three names, e.g.:
#   certbot certonly --webroot -w /var/www/certbot \
#     -d budlog.pl -d www.budlog.pl -d api.budlog.pl --expand
# (or add -d ... --expand to your existing shared cert).

# --- HTTP: ACME challenge + redirect to HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name budlog.pl www.budlog.pl api.budlog.pl;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- API: api.budlog.pl → budlog-api-prod:3000 ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.budlog.pl;

    ssl_certificate     /etc/letsencrypt/live/budlog.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/budlog.pl/privkey.pem;

    client_max_body_size 15m;  # voice notes / photos via Telegram webhook

    location / {
        proxy_pass http://budlog-api-prod:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# --- www → apex ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.budlog.pl;

    ssl_certificate     /etc/letsencrypt/live/budlog.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/budlog.pl/privkey.pem;

    return 301 https://budlog.pl$request_uri;
}

# --- Web report: budlog.pl → budlog-web-prod:3001 ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name budlog.pl;

    ssl_certificate     /etc/letsencrypt/live/budlog.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/budlog.pl/privkey.pem;

    location / {
        proxy_pass http://budlog-web-prod:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
