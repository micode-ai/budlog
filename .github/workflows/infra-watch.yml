name: Infra Watch

on:
  # Manual-only for now — re-enable the schedule once the VPS + secrets exist.
  # schedule:
  #   - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: infra-watch
  cancel-in-progress: true

jobs:
  watch:
    name: Disk + container health
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout (for script)
        uses: actions/checkout@v5

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_infra
          chmod 600 ~/.ssh/id_infra

      - name: Run infra check over SSH
        id: check
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set +e
          OUT=$(ssh -o StrictHostKeyChecking=accept-new -o BatchMode=yes -i ~/.ssh/id_infra \
            "$SSH_USER@$SSH_HOST" 'bash -s' < scripts/infra-check.sh 2>&1)
          CODE=$?
          echo "$OUT"
          { echo "code=$CODE"; echo "summary<<EOF"; echo "$OUT"; echo "EOF"; } >> "$GITHUB_OUTPUT"
          exit 0

      - name: Notify Telegram on problem
        if: steps.check.outputs.code != '0'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUMMARY: ${{ steps.check.outputs.summary }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID secret missing — cannot alert" >&2
            exit 1
          fi
          MESSAGE=$(printf $'\xE2\x9A\xA0\xEF\xB8\x8F *BudLog INFRA WARNING* \xE2\x9A\xA0\xEF\xB8\x8F\n\n```\n%s\n```\n\n[GitHub run](%s)' "$SUMMARY" "$RUN_URL")
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" -d "parse_mode=Markdown" -d "disable_web_page_preview=true" \
            --data-urlencode "text=${MESSAGE}"
